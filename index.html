<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giochini 🎮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🎮</text></svg>">
    <link rel="apple-touch-icon" id="apple-touch-icon">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #a2d2ff;
            --pastel-yellow: #fdfd96;
            --pastel-green: #b4f8c8;
            --pastel-red: #ff968a;
            --pastel-purple: #c5b3e6;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, 
                var(--pastel-pink) 0%, 
                var(--pastel-yellow) 20%, 
                var(--pastel-green) 40%, 
                var(--pastel-blue) 60%, 
                var(--pastel-purple) 80%, 
                var(--pastel-pink) 100%);
            background-size: 400% 400%;
            animation: rainbowBG 15s ease infinite;
        }

        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: clamp(20px, 6vw, 60px);
            padding-top: 100px; /* Space for the floating header */
            box-sizing: border-box;
        }

        .header {
            width: fit-content;
            display: flex;
            flex-direction: column;
            margin-bottom: 0;
            position: absolute;
            left: 20px;
            top: 20px;
            z-index: 100;
        }

        .lang-switcher {
            display: flex;
            flex-direction: column; /* Vertical */
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            padding: 12px 8px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }

        .lang-btn {
            font-size: 1.8rem;
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px;
            transition: transform 0.2s;
            filter: grayscale(0.8);
        }

        .lang-btn.active {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(15px, 2.5vw, 25px);
            width: 100%;
            max-width: 950px; /* Reduced for smaller squares */
            margin: 0 auto;
            align-content: start;
        }

        .game-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
            min-width: 0;
        }

        .game-item:active {
            transform: scale(0.96);
        }

        .game-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: clamp(15px, 3.5vw, 35px);
            border: clamp(3px, 0.6vw, 6px) solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            aspect-ratio: 1 / 1;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }

        .game-card.empty {
            background: rgba(255, 255, 255, 0.1);
            border: 3px dashed rgba(255, 255, 255, 0.3);
            box-shadow: none;
            pointer-events: none;
        }

        .game-icon {
            font-size: clamp(2rem, 6vw, 5rem); /* Slightly smaller icons */
            line-height: 1;
            display: block;
        }

        .game-name {
            font-size: clamp(0.8rem, 1.6vw, 1.3rem); /* Slightly smaller names */
            font-weight: 900;
            color: #444;
            text-align: center;
            line-height: 1.1;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            padding: 0 5px;
            height: 2.5em; 
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
            width: 100%;
        }

        /* Landscape optimization */
        @media (orientation: landscape) {
            .grid { gap: clamp(15px, 2.5vw, 30px); max-width: 950px; }
            .game-icon { font-size: clamp(2.5rem, 8vw, 6rem); }
            .game-name { font-size: clamp(0.9rem, 2vw, 1.5rem); }
        }
    </style>
</head>
<body>
<!-- Launcher v3.7 -->

<div class="container">
    <div class="header">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLanguage('it')" title="Italiano">🇮🇹</button>
            <button class="lang-btn" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
            <button class="lang-btn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="lang-btn" onclick="setLanguage('es')" title="Español">🇪🇸</button>
        </div>
    </div>

    <div class="grid">
        <a href="orologio/index.html" class="game-item">
            <div class="game-card">
                <div class="game-icon">🕒</div>
            </div>
            <div class="game-name" id="name-orologio">Orologio</div>
        </a>
        <a href="sinistra-destra/index.html" class="game-item">
            <div class="game-card">
                <div class="game-icon">↔️</div>
            </div>
            <div class="game-name" id="name-sd">Sinistra o Destra?</div>
        </a>
        <a href="leggere/index.html" class="game-item">
            <div class="game-card">
                <div class="game-icon">📖</div>
            </div>
            <div class="game-name" id="name-leggere">Leggere</div>
        </a>
        <div class="game-item">
            <div class="game-card empty"></div>
            <div class="game-name"></div>
        </div>
        
        <div class="game-item"><div class="game-card empty"></div><div class="game-name"></div></div>
        <div class="game-item"><div class="game-card empty"></div><div class="game-name"></div></div>
        <div class="game-item"><div class="game-card empty"></div><div class="game-name"></div></div>
        <div class="game-item"><div class="game-card empty"></div><div class="game-name"></div></div>
    </div>
</div>

<script>
    // Generate apple-touch-icon
    (function() {
        const c = document.createElement('canvas');
        c.width = 180; c.height = 180;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#c5b3e6'; // pastel-purple
        ctx.beginPath(); ctx.roundRect(0, 0, 180, 180, 36); ctx.fill();
        ctx.font = '120px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🎮', 90, 96);
        document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
    })();

    const translations = {
        it: {
            orologio: "Orologio",
            sd: "Sinistra o Destra?",
            leggere: "Leggere"
        },
        en: {
            orologio: "Clock",
            sd: "Left or Right?",
            leggere: "Read"
        },
        de: {
            orologio: "Uhr",
            sd: "Links oder Rechts?",
            leggere: "Lesen"
        },
        es: {
            orologio: "Reloj",
            sd: "¿Izquierda o Derecha?",
            leggere: "Leer"
        }
    };

    function setLanguage(lang) {
        localStorage.setItem('game_lang', lang);
        localStorage.setItem('game_lang_sd', lang);
        localStorage.setItem('game_lang_leggere', lang);
        
        document.getElementById('name-orologio').textContent = translations[lang].orologio;
        document.getElementById('name-sd').textContent = translations[lang].sd;
        document.getElementById('name-leggere').textContent = translations[lang].leggere;

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`));
        });
    }

    (function initLang() {
        const savedLang = localStorage.getItem('game_lang') || localStorage.getItem('game_lang_sd') || localStorage.getItem('game_lang_leggere');
        if (savedLang && translations[savedLang]) {
            setLanguage(savedLang);
        } else {
            const navLang = navigator.language.split('-')[0];
            if (translations[navLang]) setLanguage(navLang);
            else setLanguage('en');
        }
    })();
</script>

</body>
</html>
