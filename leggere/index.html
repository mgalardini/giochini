<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leggere 📖</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>📖</text></svg>">
    <link rel="apple-touch-icon" id="apple-touch-icon">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Leggere">
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #a2d2ff;
            --pastel-yellow: #fdfd96;
            --pastel-green: #b4f8c8;
            --pastel-red: #ff968a;
            --pastel-purple: #c5b3e6;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
            background: linear-gradient(135deg, 
                var(--pastel-pink) 0%, 
                var(--pastel-yellow) 20%, 
                var(--pastel-green) 40%, 
                var(--pastel-blue) 60%, 
                var(--pastel-purple) 80%, 
                var(--pastel-pink) 100%);
            background-size: 400% 400%;
            animation: rainbowBG 15s ease infinite;
        }

        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
            flex-shrink: 0;
        }

        .lang-switcher {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .lang-btn {
            font-size: 1.8rem;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px;
            transition: transform 0.2s;
            filter: grayscale(0.8);
        }

        .lang-btn.active {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        .score-board {
            font-size: 2.5rem;
            color: #444;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .restart-button {
            font-size: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .restart-button:active {
            transform: rotate(-180deg) scale(0.9);
            background-color: white;
        }

        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
        }

        .word-display {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            color: #333;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.6);
            padding: 40px 80px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 8px white solid;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 300px;
            text-align: center;
            letter-spacing: 10px;
        }

        .controls {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 10px solid white;
            background-color: var(--pastel-blue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            transition: transform 0.2s, background-color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .mic-button.listening {
            background-color: var(--pastel-red);
            animation: pulse-mic 1s infinite;
        }

        @keyframes pulse-mic {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .skip-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 8px solid white;
            background-color: var(--pastel-yellow);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            z-index: 20;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .start-icon {
            font-size: 10rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Feedback States */
        .correct-anim {
            background-color: var(--pastel-green) !important;
            transform: scale(1.1);
        }
        .wrong-anim {
            background-color: var(--pastel-red) !important;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-20px); }
            40% { transform: translateX(20px); }
            60% { transform: translateX(-20px); }
            80% { transform: translateX(20px); }
        }

        .next-anim {
            opacity: 0;
            transform: translateY(30px) scale(0.8);
        }

        #speech-status {
            position: absolute;
            bottom: 30px;
            font-size: 1.5rem;
            color: #666;
            background: rgba(255,255,255,0.5);
            padding: 5px 20px;
            border-radius: 15px;
        }

        /* iPad Landscape */
        @media (orientation: landscape) {
            .game-area { gap: 60px; }
            .word-display { font-size: 12rem; padding: 60px 120px; }
            .mic-button { width: 150px; height: 150px; font-size: 5rem; }
            .skip-button { width: 120px; height: 120px; font-size: 4rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="score-board"><span id="txt-score">Punti</span>: <span id="score">0</span></div>
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLanguage('it')" title="Italiano">🇮🇹</button>
            <button class="lang-btn" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
            <button class="lang-btn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="lang-btn" onclick="setLanguage('es')" title="Español">🇪🇸</button>
        </div>
        <button id="btn-restart" class="restart-button" onclick="resetGame()">🔄</button>
    </div>

    <div class="game-area">
        <div id="start-overlay" class="start-overlay"><span class="start-icon">👆</span></div>
        <div id="word" class="word-display">...</div>
        
        <div class="controls">
            <button id="btn-listen" class="skip-button" onclick="hearAndSkip()">🗣️</button>
            <button id="btn-mic" class="mic-button" onclick="toggleMic()">🎤</button>
        </div>

        <div id="speech-status" style="display: none;"></div>
    </div>
</div>

<script>
    // Generate apple-touch-icon
    (function() {
        const c = document.createElement('canvas');
        c.width = 180; c.height = 180;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#b4f8c8';
        ctx.beginPath(); ctx.roundRect(0, 0, 180, 180, 36); ctx.fill();
        ctx.font = '120px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('📖', 90, 96);
        document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
    })();

    let score = 0;
    let currentWord = '';
    let isListening = false;
    let recognition = null;
    let currentLang = 'it';

    const wordLists = {
        it: {
            3: ["APE", "BUE", "VIA", "ZOO", "SCI", "ORA", "LUI", "NOI", "VOI", "MIO", "REI", "BLU", "AGO", "ERA", "PIO"],
            4: ["MELA", "SOLE", "CANE", "PANE", "CASA", "MARE", "LUCE", "PERO", "CODA", "NASO", "MANO", "VISO", "ERBA", "ORSO", "NIDO", "VINO"],
            5: ["GATTO", "LATTE", "LIBRO", "FIORE", "PORTA", "TRENO", "AEREO", "FUOCO", "ACQUA", "CORPO", "BOSCO", "VOLPE", "BARCA", "CAMPO", "FESTA"],
            6: ["SCUOLA", "AMICO", "PIANTA", "FRUTTO", "STRADA", "ESTATE", "NONNO", "NONNA", "PIATTO", "TAVOLO", "MATITA", "LAVORO", "SOGNO", "MESSA", "CUCINA"],
            7: ["GIARDINO", "BAMBINO", "FINESTRA", "CASTELLO", "ELEFANTE", "STELLA", "LIMONE", "CILIEGIA", "PULCINO", "QUADERNO", "BISCARI", "CANCELLO", "MONTAGNA", "INVERNO", "SQUADRA"]
        },
        en: {
            3: ["CAT", "DOG", "SUN", "BOX", "CAR", "RED", "BIG", "ANT", "BOY", "SKY", "ICE", "TEA", "HAT", "FLY", "CUP"],
            4: ["BOOK", "MILK", "FISH", "TREE", "HOME", "BALL", "STAR", "BLUE", "CAKE", "BIRD", "MOON", "FIRE", "SNOW", "DUCK", "COLD", "WIND"],
            5: ["APPLE", "BREAD", "WATER", "HOUSE", "TRAIN", "GREEN", "SMALL", "MOUSE", "PHONE", "PAPER", "CHAIR", "PIANO", "CLOCK", "TABLE", "SMILE"],
            6: ["SCHOOL", "FRIEND", "FLOWER", "ORANGE", "WINDOW", "SUMMER", "WINTER", "BANANA", "ANIMAL", "CIRCUS", "POTATO", "TOMATO", "GUITAR", "BOTTLE", "ROCKET"],
            7: ["GARDEN", "KITCHEN", "MORNING", "PICTURE", "RAINBOW", "CHICKEN", "AIRPORT", "DOLPHIN", "PUMPKIN", "HOLIDAY", "FEATHER", "SCISSOR", "LIBRARY", "WEATHER", "HAMSTER"]
        },
        de: {
            3: ["ICE", "SEE", "HUT", "ROT", "TAG", "TOR", "UND", "ICH", "OHR", "AST", "BÄR", "GAS", "NEU", "AUS", "ALT"],
            4: ["BROT", "HAUS", "BAUM", "FISCH", "KIND", "GELB", "HAND", "MOND", "REIS", "SALZ", "KALT", "WARM", "BLAU", "GELD", "LAND", "BERG"],
            5: ["APFEL", "MILCH", "STADT", "STERN", "BLUME", "VOGEL", "SONNE", "FEUER", "WASSER", "TISCH", "STUHL", "NACHT", "LAMPE", "TIGER", "KÜCHE"],
            6: ["SCHULE", "FREUND", "GARTEN", "WASSER", "HERBST", "WINTER", "REGEN", "WOLKE", "KIRSCHE", "BANANE", "BRUDER", "FENSTER", "SOMMER", "STRAND", "SCHNEE"],
            7: ["BAHNHOF", "SCHLOSS", "STRASSE", "ZEITUNG", "FLUGZEUG", "ELEFANT", "KROKODIL", "PULOVER", "TRAKTOR", "ZIMMERI", "SCHRANK", "SPIEGEL", "GIRAFFE", "KLAVIER", "TOMATEN"]
        },
        es: {
            3: ["SOL", "PAN", "VER", "LUZ", "MAR", "CON", "UNO", "DOS", "REY", "ORO", "PAZ", "DIA", "SER", "PIO", "FIN"],
            4: ["CASA", "GATO", "AZUL", "PAPA", "MAMA", "LUNA", "ROJO", "MESA", "PELO", "CARA", "OJO", "PERA", "RANA", "TREN", "VINO", "BOLA"],
            5: ["PERRO", "LECHE", "LIBRO", "FLOR", "VERDE", "AGUA", "ARBOL", "RATON", "QUESO", "TIGRE", "MANO", "FUEGO", "COCHE", "RADIO", "PLAYA"],
            6: ["ESCUELA", "AMIGO", "PUERTA", "CIUDAD", "TIEMPO", "VERANO", "PLATO", "FRUTA", "PUEBLO", "CAMINO", "PAJARO", "COMIDA", "CABELLO", "DIBUJO", "ESTRELLA"],
            7: ["JARDIN", "VENTANA", "NARANJA", "PLATANO", "HELADO", "MAÑANA", "GALLETA", "CABALLO", "PISCINA", "CEREBRO", "COLEGIO", "TRABAJO", "CORAZON", "MOCHILA", "PELICULA"]
        }
    };

    const translations = {
        it: { title: "Leggere", score: "Punti", status: "Ti ascolto...", error: "Riprova!" },
        en: { title: "Read", score: "Points", status: "Listening...", error: "Try again!" },
        de: { title: "Lesen", score: "Punkte", status: "Höre zu...", error: "Nochmal!" },
        es: { title: "Leer", score: "Puntos", status: "Escuchando...", error: "¡Otra vez!" }
    };

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('game_lang_leggere', lang);
        document.title = translations[lang].title;
        document.getElementById('txt-score').textContent = translations[lang].score;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`));
        });
        if (currentWord) nextRound(true); // reload word for new language
    }

    // Auto-detect language
    (function initLang() {
        const savedLang = localStorage.getItem('game_lang_leggere');
        if (savedLang && translations[savedLang]) setLanguage(savedLang);
        else {
            const navLang = navigator.language.split('-')[0];
            if (translations[navLang]) setLanguage(navLang);
            else setLanguage('en');
        }
    })();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.2);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        }
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = currentLang;
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }
    }

    function initSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Speech recognition not supported in this browser.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const result = event.results[0][0].transcript.toUpperCase().trim();
            checkAnswer(result);
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById('btn-mic').classList.remove('listening');
            document.getElementById('speech-status').style.display = 'none';
        };

        recognition.onerror = () => {
            isListening = false;
            document.getElementById('btn-mic').classList.remove('listening');
        };
    }

    function toggleMic() {
        if (!recognition) initSpeech();
        if (isListening) {
            recognition.stop();
        } else {
            recognition.lang = currentLang;
            recognition.start();
            isListening = true;
            document.getElementById('btn-mic').classList.add('listening');
            const status = document.getElementById('speech-status');
            status.textContent = translations[currentLang].status;
            status.style.display = 'block';
        }
    }

    function nextRound(staySameLevel = false) {
        const wordEl = document.getElementById('word');
        wordEl.classList.add('next-anim');
        
        setTimeout(() => {
            // Determine word length based on score
            let len = 4;
            if (score < 3) len = Math.random() > 0.5 ? 3 : 4;
            else if (score < 6) len = Math.random() > 0.5 ? 4 : 5;
            else if (score < 10) len = Math.random() > 0.5 ? 5 : 6;
            else len = Math.random() > 0.5 ? 6 : 7;

            const list = wordLists[currentLang][len] || wordLists[currentLang][4];
            let next;
            do { next = list[Math.floor(Math.random() * list.length)]; } while (next === currentWord);
            
            currentWord = next;
            wordEl.textContent = currentWord;
            wordEl.classList.remove('next-anim', 'correct-anim', 'wrong-anim');
        }, 500);
    }

    function checkAnswer(guess) {
        const target = currentWord.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        const cleanedGuess = guess.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        
        const wordEl = document.getElementById('word');

        if (cleanedGuess === target || cleanedGuess.includes(target) || target.includes(cleanedGuess) && target.length > 2) {
            score++;
            document.getElementById('score').textContent = score;
            wordEl.classList.add('correct-anim');
            playSound('correct');
            setTimeout(() => nextRound(), 1000);
        } else {
            score = 0;
            document.getElementById('score').textContent = score;
            wordEl.classList.add('wrong-anim');
            playSound('wrong');
            speak(currentWord);
            setTimeout(() => nextRound(), 1500);
        }
    }

    function hearAndSkip() {
        speak(currentWord);
        nextRound();
    }

    function resetGame() {
        score = 0;
        document.getElementById('score').textContent = score;
        document.getElementById('start-overlay').style.display = 'flex';
        currentWord = '';
        document.getElementById('word').textContent = '...';
    }

    document.addEventListener('click', function init(e) {
        if (e.target.closest('#btn-restart') || e.target.closest('.lang-switcher')) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!currentWord) {
            document.getElementById('start-overlay').style.display = 'none';
            nextRound();
        }
    });

</script>

</body>
</html>
