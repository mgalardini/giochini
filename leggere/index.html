<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leggere 📖</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>📖</text></svg>">
    <link rel="apple-touch-icon" id="apple-touch-icon">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Leggere">
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #a2d2ff;
            --pastel-yellow: #fdfd96;
            --pastel-green: #b4f8c8;
            --pastel-red: #ff968a;
            --pastel-purple: #c5b3e6;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, 
                var(--pastel-pink) 0%, 
                var(--pastel-yellow) 20%, 
                var(--pastel-green) 40%, 
                var(--pastel-blue) 60%, 
                var(--pastel-purple) 80%, 
                var(--pastel-pink) 100%);
            background-size: 400% 400%;
            animation: rainbowBG 15s ease infinite;
        }

        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
            flex-shrink: 0;
        }

        .lang-switcher {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .lang-btn {
            font-size: 1.8rem;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px;
            transition: transform 0.2s;
            filter: grayscale(0.8);
        }

        .lang-btn.active {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        .restart-button {
            font-size: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .restart-button:active {
            transform: rotate(-180deg) scale(0.9);
            background-color: white;
        }

        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 60px;
            width: 100%;
        }

        .word-display {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            color: #333;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.6);
            padding: 40px 80px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 8px white solid;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 300px;
            text-align: center;
            letter-spacing: 5px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .letter {
            display: inline-block;
            transition: transform 0.3s, color 0.3s;
        }

        .letter.active {
            color: var(--pastel-red);
            transform: scale(1.3) translateY(-10px);
        }

        .word-display.enunciating {
            animation: enunciate 0.8s ease-in-out;
        }

        @keyframes enunciate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .speak-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 10px solid white;
            background-color: var(--pastel-blue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            transition: transform 0.2s, background-color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .speak-button:active {
            transform: scale(0.9);
        }

        .speak-button.disabled {
            filter: grayscale(0.5);
            opacity: 0.7;
            cursor: default;
            pointer-events: none;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            z-index: 20;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .start-icon {
            font-size: 10rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .next-anim {
            opacity: 0;
            transform: translateY(30px) scale(0.8);
        }

        /* iPad Landscape */
        @media (orientation: landscape) {
            .game-area { gap: 80px; }
            .word-display { font-size: 12rem; padding: 60px 120px; }
            .speak-button { width: 180px; height: 180px; font-size: 7rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLanguage('it')" title="Italiano">🇮🇹</button>
            <button class="lang-btn" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
            <button class="lang-btn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="lang-btn" onclick="setLanguage('es')" title="Español">🇪🇸</button>
        </div>
        <button id="btn-restart" class="restart-button" onclick="resetGame()">🔄</button>
    </div>

    <div class="game-area">
        <div id="start-overlay" class="start-overlay"><span class="start-icon">👆</span></div>
        <div id="word" class="word-display">...</div>
        
        <button id="btn-speak" class="speak-button" onclick="startSpelling()">🗣️</button>
    </div>
</div>

<script>
    // Generate apple-touch-icon
    (function() {
        const c = document.createElement('canvas');
        c.width = 180; c.height = 180;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#b4f8c8';
        ctx.beginPath(); ctx.roundRect(0, 0, 180, 180, 36); ctx.fill();
        ctx.font = '120px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('📖', 90, 96);
        document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
    })();

    let wordCounter = 0;
    let currentWord = '';
    let currentLang = 'it';
    let isSpelling = false;

    const wordLists = {
        it: {
            3: ["APE", "BUE", "VIA", "BLU", "AGO", "ERA", "PIO", "MIO", "TUA", "ZIO", "ZIA", "NON", "CON", "CHI", "MAI"],
            4: ["MELA", "SOLE", "CANE", "PANE", "CASA", "MARE", "LUCE", "PERO", "CODA", "NASO", "MANO", "VISO", "ERBA", "ORSO", "NIDO"],
            5: ["GATTO", "LATTE", "LIBRO", "FIORE", "PORTA", "TRENO", "AEREO", "FUOCO", "ACQUA", "CORPO", "BOSCO", "VOLPE", "BARCA", "CAMPO", "FESTA"],
            6: ["SCUOLA", "AMICO", "PIANTA", "FRUTTO", "STRADA", "ESTATE", "NONNO", "NONNA", "PIATTO", "TAVOLO", "MATITA", "LAVORO", "SOGNO", "CUCINA", "LIMONE"],
            7: ["GIARDINO", "BAMBINO", "FINESTRA", "CASTELLO", "ELEFANTE", "STELLA", "PULCINO", "QUADERNO", "CANCELLO", "MONTAGNA", "INVERNO", "SQUADRA", "BANANA", "FRUTTA", "SABATO"]
        },
        en: {
            3: ["CAT", "DOG", "SUN", "BOX", "CAR", "RED", "BIG", "ANT", "BOY", "SKY", "ICE", "TEA", "HAT", "FLY", "CUP"],
            4: ["BOOK", "MILK", "FISH", "TREE", "HOME", "BALL", "STAR", "BLUE", "CAKE", "BIRD", "MOON", "FIRE", "SNOW", "DUCK", "COLD"],
            5: ["APPLE", "BREAD", "WATER", "HOUSE", "TRAIN", "GREEN", "SMALL", "MOUSE", "PHONE", "PAPER", "CHAIR", "PIANO", "CLOCK", "TABLE", "SMILE"],
            6: ["SCHOOL", "FRIEND", "FLOWER", "ORANGE", "WINDOW", "SUMMER", "WINTER", "BANANA", "ANIMAL", "CIRCUS", "POTATO", "TOMATO", "GUITAR", "BOTTLE", "ROCKET"],
            7: ["GARDEN", "KITCHEN", "MORNING", "PICTURE", "RAINBOW", "CHICKEN", "AIRPORT", "DOLPHIN", "PUMPKIN", "HOLIDAY", "FEATHER", "SCISSOR", "LIBRARY", "WEATHER", "HAMSTER"]
        },
        de: {
            3: ["ICE", "SEE", "HUT", "ROT", "TAG", "TOR", "UND", "ICH", "OHR", "AST", "BÄR", "GAS", "NEU", "AUS", "ALT"],
            4: ["BROT", "HAUS", "BAUM", "FISCH", "KIND", "GELB", "HAND", "MOND", "REIS", "SALZ", "KALT", "WARM", "BLAU", "GELD", "LAND"],
            5: ["APFEL", "MILCH", "STADT", "STERN", "BLUME", "VOGEL", "SONNE", "FEUER", "WASSER", "TISCH", "STUHL", "NACHT", "LAMPE", "TIGER", "KÜCHE"],
            6: ["SCHULE", "FREUND", "GARTEN", "WASSER", "HERBST", "WINTER", "REGEN", "WOLKE", "KIRSCHE", "BANANE", "BRUDER", "FENSTER", "SOMMER", "STRAND", "SCHNEE"],
            7: ["BAHNHOF", "SCHLOSS", "STRASSE", "ZEITUNG", "FLUGZEUG", "ELEFANT", "KROKODIL", "PULOVER", "TRAKTOR", "SCHRANK", "SPIEGEL", "GIRAFFE", "KLAVIER", "TOMATEN"]
        },
        es: {
            3: ["SOL", "PAN", "VER", "LUZ", "MAR", "CON", "UNO", "DOS", "REY", "ORO", "PAZ", "DIA", "SER", "PIO", "FIN"],
            4: ["CASA", "GATO", "AZUL", "PAPA", "MAMA", "LUNA", "ROJO", "MESA", "PELO", "CARA", "OJO", "PERA", "RANA", "TREN", "VINO"],
            5: ["PERRO", "LECHE", "LIBRO", "FLOR", "VERDE", "AGUA", "ARBOL", "RATON", "QUESO", "TIGRE", "MANO", "FUEGO", "COCHE", "RADIO", "PLAYA"],
            6: ["ESCUELA", "AMIGO", "PUERTA", "CIUDAD", "TIEMPO", "VERANO", "PLATO", "FRUTA", "PUEBLO", "CAMINO", "PAJARO", "COMIDA", "CABELLO", "DIBUJO", "ESTRELLA"],
            7: ["JARDIN", "VENTANA", "NARANJA", "PLATANO", "HELADO", "MAÑANA", "GALLETA", "CABALLO", "PISCINA", "CEREBRO", "COLEGIO", "TRABAJO", "CORAZON", "MOCHILA", "PELICULA"]
        }
    };

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('game_lang_leggere', lang);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`));
        });
        if (currentWord) nextRound();
    }

    // Auto-detect language
    (function initLang() {
        const savedLang = localStorage.getItem('game_lang_leggere');
        if (savedLang && wordLists[savedLang]) setLanguage(savedLang);
        else {
            const navLang = navigator.language.split('-')[0];
            if (wordLists[navLang]) setLanguage(navLang);
            else setLanguage('en');
        }
    })();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function speak(text, rate = 0.8, onEnd) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            // Aggressively normalize to lowercase and remove any non-alpha chars
            const cleanText = text.toLowerCase().trim();
            const u = new SpeechSynthesisUtterance(cleanText);
            const langMap = { it: 'it-IT', de: 'de-DE', en: 'en-GB', es: 'es-ES' };
            u.lang = langMap[currentLang] || currentLang;
            u.rate = rate;
            u.pitch = 1.15;
            u.volume = 1.0;

            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => 
                v.lang.startsWith(currentLang) && 
                (v.name.includes('Alice') || v.name.includes('Natural') || v.name.includes('Siri') || v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Anna') || v.name.includes('Monica') || v.name.includes('Helena'))
            );

            if (preferredVoice) {
                u.voice = preferredVoice;
            } else {
                u.voice = voices.find(v => v.lang === langMap[currentLang]) || voices.find(v => v.lang.startsWith(currentLang));
            }

            if (onEnd) u.onend = onEnd;
            window.speechSynthesis.speak(u);
        }
    }

    function startSpelling() {
        if (isSpelling) return;
        isSpelling = true;
        document.getElementById('btn-speak').classList.add('disabled');
        
        const letters = document.querySelectorAll('.letter');
        let i = 0;

        function spellNext() {
            if (i < letters.length) {
                const char = letters[i].textContent.toLowerCase();
                letters.forEach(l => l.classList.remove('active'));
                letters[i].classList.add('active');
                
                speak(char, 0.6, () => {
                    i++;
                    setTimeout(spellNext, 200);
                });
            } else {
                letters.forEach(l => l.classList.remove('active'));
                setTimeout(() => {
                    const wordEl = document.getElementById('word');
                    const colors = ['var(--pastel-red)', 'var(--pastel-blue)', 'var(--pastel-green)', 'var(--pastel-purple)', 'var(--pastel-pink)'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    wordEl.style.color = randomColor;
                    wordEl.classList.add('enunciating');
                    
                    speak(currentWord, 0.8, () => {
                        isSpelling = false;
                        document.getElementById('btn-speak').classList.remove('disabled');
                        setTimeout(() => {
                            wordEl.classList.remove('enunciating');
                            wordEl.style.color = '#333';
                            nextRound();
                        }, 1500);
                    });
                }, 400);
            }
        }
        spellNext();
    }

    function nextRound() {
        if (isSpelling) return;
        const wordEl = document.getElementById('word');
        wordEl.classList.add('next-anim');
        
        setTimeout(() => {
            wordCounter++;
            let len = 4;
            if (wordCounter < 5) len = 3;
            else if (wordCounter < 12) len = 4;
            else if (wordCounter < 20) len = 5;
            else if (wordCounter < 30) len = 6;
            else len = 7;

            const list = wordLists[currentLang][len] || wordLists[currentLang][4];
            let next;
            do { next = list[Math.floor(Math.random() * list.length)]; } while (next === currentWord);
            
            currentWord = next;
            wordEl.innerHTML = '';
            currentWord.split('').forEach(char => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = char;
                wordEl.appendChild(span);
            });
            
            wordEl.classList.remove('next-anim');
        }, 500);
    }

    function resetGame() {
        wordCounter = 0;
        document.getElementById('start-overlay').style.display = 'flex';
        currentWord = '';
        document.getElementById('word').textContent = '...';
    }

    document.addEventListener('click', function init(e) {
        if (e.target.closest('#btn-restart') || e.target.closest('.lang-switcher') || e.target.closest('#btn-speak')) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!currentWord) {
            document.getElementById('start-overlay').style.display = 'none';
            nextRound();
        }
    });

    // Warm up voices
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

</script>

</body>
</html>
