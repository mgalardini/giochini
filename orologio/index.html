<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Che ore sono? 🕒</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🕒</text></svg>">
    <link rel="apple-touch-icon" id="apple-touch-icon">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Orologio">
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #a2d2ff;
            --pastel-yellow: #fdfd96;
            --pastel-green: #b4f8c8;
            --pastel-red: #ff968a;
            --pastel-purple: #c5b3e6;
            --clock-face: #ffffff;
            --hour-hand: #333333;
            --minute-hand: #666666;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
            background: linear-gradient(135deg, 
                var(--pastel-pink) 0%, 
                var(--pastel-yellow) 20%, 
                var(--pastel-green) 40%, 
                var(--pastel-blue) 60%, 
                var(--pastel-purple) 80%, 
                var(--pastel-pink) 100%);
            background-size: 400% 400%;
            animation: rainbowBG 15s ease infinite;
        }

        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
            flex-shrink: 0;
        }

        .lang-switcher {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .lang-btn {
            font-size: 1.8rem;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px;
            transition: transform 0.2s;
            filter: grayscale(0.8);
        }

        .lang-btn.active {
            filter: grayscale(0);
            transform: scale(1.2);
        }

        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .score-board {
            font-size: 2.5rem;
            color: #444;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .restart-button {
            font-size: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .restart-button:active {
            transform: rotate(-180deg) scale(0.9);
            background-color: white;
        }

        /* Clock Styles */
        #clock-container {
            width: 300px;
            height: 300px;
            background: var(--clock-face);
            border-radius: 50%;
            border: 15px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 0 25px rgba(0,0,0,0.05);
            position: relative;
            transition: background-color 0.5s ease;
            flex-shrink: 0;
        }

        .clock-face {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .number {
            position: absolute;
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(-50%, -50%);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .hour-hand {
            width: 12px;
            height: 70px;
            background: var(--hour-hand);
            z-index: 3;
        }

        .minute-hand {
            width: 8px;
            height: 110px;
            background: var(--minute-hand);
            z-index: 2;
        }

        .guess-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
            pointer-events: none;
        }

        .guess-hour-hand {
            width: 12px;
            height: 70px;
            background: rgba(197, 179, 230, 0.8); /* pastel-purple with alpha */
            z-index: 5;
        }

        .guess-minute-hand {
            width: 8px;
            height: 110px;
            background: rgba(197, 179, 230, 0.6);
            z-index: 4;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #222;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
        }

        /* Input Styles */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 20px 35px;
            border-radius: 35px;
            backdrop-filter: blur(8px);
            border: 4px white solid;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .input-label {
            font-size: 1.1rem;
            font-weight: 900;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .spin-btn {
            width: 70px;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.85);
            font-size: 1.8rem;
            font-weight: 900;
            color: #555;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: background 0.15s;
            line-height: 1;
        }

        .spin-btn:active {
            background: rgba(255,255,255,1);
            transform: scale(0.93);
        }

        .spin-value {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: white;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 3.2rem;
            font-weight: 900;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
            transition: background-color 0.3s;
        }

        #input-minutes .spin-value { width: 100px; }

        .separator {
            font-size: 4rem;
            font-weight: 900;
            color: #444;
            line-height: 1;
        }

        .button-group {
            display: flex;
            gap: 25px;
        }

        .action-button {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            transition: transform 0.2s, background-color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-button:active {
            transform: scale(0.9);
        }

        .check-button {
            background-color: var(--pastel-green);
        }

        .speak-button {
            background-color: var(--pastel-blue);
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .start-icon {
            font-size: 11rem;
            display: block;
            line-height: 1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Input Feedback Classes */
        .correct-input {
            background-color: var(--pastel-green) !important;
            animation: pulseCorrect 0.4s ease-out;
        }

        .wrong-input {
            background-color: var(--pastel-red) !important;
            animation: shake 0.4s ease-in-out;
        }

        /* Feedback States */
        .correct-bg { background-color: var(--pastel-green) !important; animation: pulseCorrect 0.5s ease-out; }
        .wrong-bg { background-color: var(--pastel-red) !important; animation: shake 0.5s ease-in-out; }

        @keyframes pulseCorrect {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px); }
            40% { transform: translateX(15px); }
            60% { transform: translateX(-15px); }
            80% { transform: translateX(15px); }
        }

        /* iPad Landscape */
        @media (orientation: landscape) {
            .game-area { flex-direction: row; gap: clamp(20px, 3vw, 60px); }
            #clock-container { width: min(480px, 70vh); height: min(480px, 70vh); border-width: 20px; }
            .controls { flex-shrink: 1; min-width: 0; }
            .number { font-size: 2.8rem; width: 60px; height: 60px; }
            .hour-hand { height: 120px; width: 18px; }
            .minute-hand { height: 180px; width: 12px; }
            .guess-hour-hand { height: 120px; width: 18px; }
            .guess-minute-hand { height: 180px; width: 12px; }
            .center-dot { width: 28px; height: 28px; }
            .spin-value { width: 100px; height: 100px; font-size: 4rem; }
            #input-minutes .spin-value { width: 120px; }
            .spin-btn { width: 90px; height: 54px; font-size: 2.2rem; }
            .action-button { width: min(120px, 14vw); height: min(120px, 14vw); font-size: min(4.5rem, 12vw); }
            .input-group { padding: 20px min(40px, 4vw); border-radius: 45px; }
            .separator { font-size: 5rem; }
            .start-icon { font-size: 15rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="score-board"><span id="txt-score">Punti</span>: <span id="score">0</span></div>
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLanguage('it')" title="Italiano">🇮🇹</button>
            <button class="lang-btn" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
            <button class="lang-btn" onclick="setLanguage('en')" title="English">🇬🇧</button>
            <button class="lang-btn" onclick="setLanguage('es')" title="Español">🇪🇸</button>
        </div>
        <button id="btn-restart" class="restart-button" onclick="resetGame()">🔄</button>
    </div>

    <div class="game-area">
        <div id="clock-container">
            <div class="clock-face" id="clock-face">
                <div id="start-overlay" class="start-overlay"><span class="start-icon">👆</span></div>
                <div class="center-dot"></div>
                <div id="hour-hand" class="hand hour-hand"></div>
                <div id="minute-hand" class="hand minute-hand"></div>
                <div id="guess-hour-hand" class="guess-hand guess-hour-hand" style="display: none;"></div>
                <div id="guess-minute-hand" class="guess-hand guess-minute-hand" style="display: none;"></div>
            </div>
        </div>

        <div class="controls">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-label" id="txt-hours">Ore</span>
                    <div class="spinner" id="input-hours">
                        <button class="spin-btn" onclick="spin('hours',1)">▲</button>
                        <div class="spin-value" data-value="">—</div>
                        <button class="spin-btn" onclick="spin('hours',-1)">▼</button>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="input-wrapper">
                    <span class="input-label" id="txt-minutes">Minuti</span>
                    <div class="spinner" id="input-minutes">
                        <button class="spin-btn" onclick="spin('minutes',1)">▲</button>
                        <div class="spin-value" data-value="">—</div>
                        <button class="spin-btn" onclick="spin('minutes',-1)">▼</button>
                    </div>
                </div>
            </div>
            <div class="button-group">
                <button class="action-button speak-button" onclick="speakCurrentTarget()">🗣️</button>
                <button class="action-button check-button" onclick="checkAnswer()">✅</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Generate apple-touch-icon as PNG for iPad home screen
    (function() {
        const c = document.createElement('canvas');
        c.width = 180; c.height = 180;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#f0f0f0';
        ctx.beginPath(); ctx.roundRect(0, 0, 180, 180, 36); ctx.fill();
        ctx.font = '140px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🕒', 90, 96);
        document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
    })();

    let score = 0;
    let targetHours = -1;
    let targetMinutes = -1;
    let isTransitioning = false;

    const translations = {
        it: { title: "Che ore sono?", score: "Punti", hours: "Ore", minutes: "Minuti", oclock: "in punto", and: "e", its: "Sono le" },
        de: { title: "Wie spät ist es?", score: "Punkte", hours: "Stunden", minutes: "Minuten", oclock: "Uhr", and: "Uhr", its: "Es ist" },
        en: { title: "What time is it?", score: "Points", hours: "Hours", minutes: "Minutes", oclock: "o'clock", and: "", its: "It's" },
        es: { title: "¿Qué hora es?", score: "Puntos", hours: "Horas", minutes: "Minutos", oclock: "en punto", and: "y", its: "Son las" }
    };

    let currentLang = 'it';

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('game_lang', lang);
        
        document.title = translations[lang].title;
        document.getElementById('txt-score').textContent = translations[lang].score;
        document.getElementById('txt-hours').textContent = translations[lang].hours;
        document.getElementById('txt-minutes').textContent = translations[lang].minutes;

        // Update active flag
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`));
        });
    }

    // Auto-detect language
    (function initLang() {
        const savedLang = localStorage.getItem('game_lang');
        if (savedLang && translations[savedLang]) {
            setLanguage(savedLang);
        } else {
            const navLang = navigator.language.split('-')[0];
            if (translations[navLang]) setLanguage(navLang);
            else setLanguage('en');
        }
    })();

    function getSpinValue(id) {
        const el = document.querySelector('#' + id + ' .spin-value');
        const v = el.getAttribute('data-value');
        return v === '' ? NaN : parseInt(v);
    }

    function setSpinValue(id, val) {
        const el = document.querySelector('#' + id + ' .spin-value');
        el.setAttribute('data-value', val);
        el.textContent = id === 'input-minutes' ? String(val).padStart(2, '0') : val;
        updateGuessHands();
    }

    function clearSpinValue(id) {
        const el = document.querySelector('#' + id + ' .spin-value');
        el.setAttribute('data-value', '');
        el.textContent = '—';
        updateGuessHands();
    }

    function updateGuessHands() {
        const h = getSpinValue('input-hours');
        const m = getSpinValue('input-minutes');
        
        const gh = document.getElementById('guess-hour-hand');
        const gm = document.getElementById('guess-minute-hand');

        if (isNaN(h) && isNaN(m)) {
            gh.style.display = 'none';
            gm.style.display = 'none';
            return;
        }

        gh.style.display = 'block';
        gm.style.display = 'block';

        const hVal = isNaN(h) ? 0 : h;
        const mVal = isNaN(m) ? 0 : m;

        const hourDeg = (hVal % 12) * 30 + (mVal / 60) * 30;
        const minuteDeg = mVal * 6;

        gh.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
        gm.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
    }

    function spin(type, dir) {
        const id = type === 'hours' ? 'input-hours' : 'input-minutes';
        let val = getSpinValue(id);
        if (type === 'hours') {
            if (isNaN(val)) val = dir > 0 ? 1 : 12;
            else { val += dir; if (val > 12) val = 1; if (val < 1) val = 12; }
        } else {
            if (isNaN(val)) val = dir > 0 ? 0 : 55;
            else { val += dir * 5; if (val > 55) val = 0; if (val < 0) val = 55; }
        }
        setSpinValue(id, val);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function speakCurrentTarget() {
        if (targetHours !== -1) {
            speakTime(targetHours, targetMinutes);
        }
    }

    function speakTime(h, m) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            const t = translations[currentLang];
            let text = "";
            
            if (currentLang === 'it') {
                let mText = m === 0 ? t.oclock : m.toString();
                text = `${t.its} ${h} ${t.and} ${mText}`;
            } else if (currentLang === 'de') {
                let mText = m === 0 ? "" : m.toString();
                text = `${t.its} ${h} ${t.oclock} ${mText}`;
            } else if (currentLang === 'en') {
                let mText = m === 0 ? t.oclock : m.toString();
                text = `${t.its} ${h} ${mText}`;
            } else if (currentLang === 'es') {
                let mText = m === 0 ? t.oclock : m.toString();
                text = `${t.its} ${h} ${t.and} ${mText}`;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLang;
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith(currentLang) && (v.name.includes('Alice') || v.name.includes('Natural') || v.name.includes('Siri') || v.name.includes('Google')));
            
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.rate = 0.85;
            utterance.pitch = 1.15;
            window.speechSynthesis.speak(utterance);
        }
    }

    function setupClock() {
        const face = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            num.innerText = i;
            const angle = (i * 30) * (Math.PI / 180);
            const radius = 42; 
            const x = 50 + radius * Math.sin(angle);
            const y = 50 - radius * Math.cos(angle);
            num.style.left = x + '%';
            num.style.top = y + '%';
            face.appendChild(num);
        }
    }

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'wrong') {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
            oscillator.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.6);
        } else if (type === 'next') {
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }
    }

    function nextRound() {
        isTransitioning = true;
        document.getElementById('start-overlay').style.display = 'none';
        playSound('next');
        
        clearSpinValue('input-hours');
        clearSpinValue('input-minutes');

        targetHours = Math.floor(Math.random() * 12) + 1;
        targetMinutes = Math.floor(Math.random() * 12) * 5;

        updateClockHands(targetHours, targetMinutes);

        setTimeout(() => {
            isTransitioning = false;
        }, 1500);
    }

    function updateClockHands(h, m) {
        const hourDeg = (h % 12) * 30 + (m / 60) * 30;
        const minuteDeg = m * 6;

        document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg + 720}deg)`;
        document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minuteDeg + 1440}deg)`;
        
        setTimeout(() => {
            document.getElementById('hour-hand').style.transition = 'none';
            document.getElementById('minute-hand').style.transition = 'none';
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('hour-hand').offsetHeight;
            document.getElementById('hour-hand').style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
            document.getElementById('minute-hand').style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
        }, 1500);
    }

    function checkAnswer() {
        if (isTransitioning || targetHours === -1) return;

        const hVal = document.querySelector('#input-hours .spin-value');
        const mVal = document.querySelector('#input-minutes .spin-value');
        const hInput = getSpinValue('input-hours');
        const mInput = getSpinValue('input-minutes');
        const clock = document.getElementById('clock-container');

        if (isNaN(hInput) || isNaN(mInput)) return;

        const normalizeHour = (h) => h === 12 ? 0 : h;
        const normalizedTargetH = normalizeHour(targetHours);
        const normalizedInputH = normalizeHour(hInput);

        const isHourCorrect = normalizedTargetH === normalizedInputH;
        const isMinuteCorrect = targetMinutes === mInput;

        if (isHourCorrect && isMinuteCorrect) {
            score++;
            document.getElementById('score').innerText = score;
            clock.classList.add('correct-bg');
            hVal.classList.add('correct-input');
            mVal.classList.add('correct-input');
            playSound('correct');
            speakTime(targetHours, targetMinutes);
            setTimeout(() => {
                clock.classList.remove('correct-bg');
                hVal.classList.remove('correct-input');
                mVal.classList.remove('correct-input');
                nextRound();
            }, 1500);
        } else {
            clock.classList.add('wrong-bg');
            playSound('wrong');

            if (isHourCorrect) {
                hVal.classList.add('correct-input');
            } else {
                hVal.classList.add('wrong-input');
                setTimeout(() => { clearSpinValue('input-hours'); }, 400);
            }

            if (isMinuteCorrect) {
                mVal.classList.add('correct-input');
            } else {
                mVal.classList.add('wrong-input');
                setTimeout(() => { clearSpinValue('input-minutes'); }, 400);
            }

            setTimeout(() => {
                clock.classList.remove('wrong-bg');
                hVal.classList.remove('correct-input', 'wrong-input');
                mVal.classList.remove('correct-input', 'wrong-input');
            }, 800);
        }
    }

    function resetGame() {
        score = 0;
        document.getElementById('score').innerText = score;
        targetHours = -1;
        targetMinutes = -1;
        document.getElementById('start-overlay').style.display = 'flex';
        clearSpinValue('input-hours');
        clearSpinValue('input-minutes');
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
    }

    // Initialize game on interaction
    document.addEventListener('click', function init(e) {
        if (e.target.closest('#btn-restart')) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (targetHours === -1) {
            nextRound();
        }
    }, { once: false });

    setupClock();
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

</script>

</body>
</html>
