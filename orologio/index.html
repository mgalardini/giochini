<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Che ore sono? 🕒</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🕒</text></svg>">
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #a2d2ff;
            --pastel-yellow: #fdfd96;
            --pastel-green: #b4f8c8;
            --pastel-red: #ff968a;
            --pastel-purple: #c5b3e6;
            --clock-face: #ffffff;
            --hour-hand: #333333;
            --minute-hand: #666666;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
            background: linear-gradient(135deg, 
                var(--pastel-pink) 0%, 
                var(--pastel-yellow) 20%, 
                var(--pastel-green) 40%, 
                var(--pastel-blue) 60%, 
                var(--pastel-purple) 80%, 
                var(--pastel-pink) 100%);
            background-size: 400% 400%;
            animation: rainbowBG 15s ease infinite;
        }

        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
            flex-shrink: 0;
        }

        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .score-board {
            font-size: 2.5rem;
            color: #444;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .restart-button {
            font-size: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .restart-button:active {
            transform: rotate(-180deg) scale(0.9);
            background-color: white;
        }

        /* Clock Styles */
        #clock-container {
            width: 300px;
            height: 300px;
            background: var(--clock-face);
            border-radius: 50%;
            border: 15px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 0 25px rgba(0,0,0,0.05);
            position: relative;
            transition: background-color 0.5s ease;
            flex-shrink: 0;
        }

        .clock-face {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .number {
            position: absolute;
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(-50%, -50%);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .hour-hand {
            width: 12px;
            height: 70px;
            background: var(--hour-hand);
            z-index: 3;
        }

        .minute-hand {
            width: 8px;
            height: 110px;
            background: var(--minute-hand);
            z-index: 2;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #222;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
        }

        /* Input Styles */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 20px 35px;
            border-radius: 35px;
            backdrop-filter: blur(8px);
            border: 4px white solid;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .input-label {
            font-size: 1.1rem;
            font-weight: 900;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="number"] {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 3.5rem;
            text-align: center;
            border: none;
            border-radius: 20px;
            background: white;
            color: #333;
            outline: none;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
            -moz-appearance: textfield;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #input-hours { width: 90px; height: 90px; }
        #input-minutes { width: 130px; height: 90px; }

        .separator {
            font-size: 4rem;
            font-weight: 900;
            color: #444;
            line-height: 1;
        }

        .button-group {
            display: flex;
            gap: 25px;
        }

        .action-button {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            transition: transform 0.2s, background-color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-button:active {
            transform: scale(0.9);
        }

        .check-button {
            background-color: var(--pastel-green);
        }

        .speak-button {
            background-color: var(--pastel-blue);
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .start-icon {
            font-size: 11rem;
            display: block;
            line-height: 1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Input Feedback Classes */
        .correct-input {
            background-color: var(--pastel-green) !important;
            animation: pulseCorrect 0.4s ease-out;
        }

        .wrong-input {
            background-color: var(--pastel-red) !important;
            animation: shake 0.4s ease-in-out;
        }

        /* Feedback States */
        .correct-bg { background-color: var(--pastel-green) !important; animation: pulseCorrect 0.5s ease-out; }
        .wrong-bg { background-color: var(--pastel-red) !important; animation: shake 0.5s ease-in-out; }

        @keyframes pulseCorrect {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px); }
            40% { transform: translateX(15px); }
            60% { transform: translateX(-15px); }
            80% { transform: translateX(15px); }
        }

        /* iPad Landscape */
        @media (orientation: landscape) {
            .game-area { flex-direction: row; gap: clamp(20px, 3vw, 60px); }
            #clock-container { width: min(480px, 75vh); height: min(480px, 75vh); border-width: 20px; }
            .controls { flex-shrink: 1; min-width: 0; }
            .number { font-size: 2.8rem; width: 60px; height: 60px; }
            .hour-hand { height: 120px; width: 18px; }
            .minute-hand { height: 180px; width: 12px; }
            .center-dot { width: 28px; height: 28px; }
            #input-hours { width: min(120px, 12vw); height: min(120px, 12vw); font-size: min(4.5rem, 11vw); }
            #input-minutes { width: min(180px, 18vw); height: min(120px, 12vw); font-size: min(4.5rem, 11vw); }
            .action-button { width: min(140px, 14vw); height: min(140px, 14vw); font-size: min(5rem, 12vw); }
            .input-group { padding: 30px min(50px, 4vw); border-radius: 45px; }
            .separator { font-size: 5rem; }
            .start-icon { font-size: 15rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="score-board">Punti: <span id="score">0</span></div>
        <button id="btn-restart" class="restart-button" onclick="resetGame()">🔄</button>
    </div>

    <div class="game-area">
        <div id="clock-container">
            <div class="clock-face" id="clock-face">
                <div id="start-overlay" class="start-overlay"><span class="start-icon">👆</span></div>
                <div class="center-dot"></div>
                <div id="hour-hand" class="hand hour-hand"></div>
                <div id="minute-hand" class="hand minute-hand"></div>
            </div>
        </div>

        <div class="controls">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-label">Ore</span>
                    <input type="tel" id="input-hours" min="1" max="12" placeholder="0" pattern="[0-9]*" inputmode="numeric">
                </div>
                <div class="separator">:</div>
                <div class="input-wrapper">
                    <span class="input-label">Minuti</span>
                    <input type="tel" id="input-minutes" min="0" max="59" step="5" placeholder="00" pattern="[0-9]*" inputmode="numeric">
                </div>
            </div>
            <div class="button-group">
                <button class="action-button speak-button" onclick="speakCurrentTarget()">🗣️</button>
                <button class="action-button check-button" onclick="checkAnswer()">✅</button>
            </div>
        </div>
    </div>
</div>

<script>
    let score = 0;
    let targetHours = -1;
    let targetMinutes = -1;
    let isTransitioning = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function speakCurrentTarget() {
        if (targetHours !== -1) {
            speakTime(targetHours, targetMinutes);
        }
    }

    function speakTime(h, m) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            // Format minutes for natural speech
            let mText = m === 0 ? "in punto" : m.toString();
            const text = `Sono le ${h} e ${mText}`;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith('it') && (v.name.includes('Alice') || v.name.includes('Natural') || v.name.includes('Siri')));
            
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.rate = 0.85;
            utterance.pitch = 1.15;
            window.speechSynthesis.speak(utterance);
        }
    }

    function setupClock() {
        const face = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            num.innerText = i;
            const angle = (i * 30) * (Math.PI / 180);
            const radius = 42; 
            const x = 50 + radius * Math.sin(angle);
            const y = 50 - radius * Math.cos(angle);
            num.style.left = x + '%';
            num.style.top = y + '%';
            face.appendChild(num);
        }
    }

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'wrong') {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
            oscillator.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.4);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.6);
        } else if (type === 'next') {
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }
    }

    function nextRound() {
        isTransitioning = true;
        document.getElementById('start-overlay').style.display = 'none';
        playSound('next');
        
        document.getElementById('input-hours').value = '';
        document.getElementById('input-minutes').value = '';

        targetHours = Math.floor(Math.random() * 12) + 1;
        targetMinutes = Math.floor(Math.random() * 12) * 5;

        updateClockHands(targetHours, targetMinutes);

        setTimeout(() => {
            isTransitioning = false;
        }, 1500);
    }

    function updateClockHands(h, m) {
        const hourDeg = (h % 12) * 30 + (m / 60) * 30;
        const minuteDeg = m * 6;

        document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg + 720}deg)`;
        document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minuteDeg + 1440}deg)`;
        
        setTimeout(() => {
            document.getElementById('hour-hand').style.transition = 'none';
            document.getElementById('minute-hand').style.transition = 'none';
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('hour-hand').offsetHeight;
            document.getElementById('hour-hand').style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
            document.getElementById('minute-hand').style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
        }, 1500);
    }

    function checkAnswer() {
        if (isTransitioning || targetHours === -1) return;

        const hInputEl = document.getElementById('input-hours');
        const mInputEl = document.getElementById('input-minutes');
        const hInput = parseInt(hInputEl.value);
        const mInput = parseInt(mInputEl.value);
        const clock = document.getElementById('clock-container');

        if (isNaN(hInput) || isNaN(mInput)) return;

        const normalizeHour = (h) => h === 12 ? 0 : h;
        const normalizedTargetH = normalizeHour(targetHours);
        const normalizedInputH = normalizeHour(hInput);

        const isHourCorrect = normalizedTargetH === normalizedInputH;
        const isMinuteCorrect = targetMinutes === mInput;

        if (isHourCorrect && isMinuteCorrect) {
            score++;
            document.getElementById('score').innerText = score;
            clock.classList.add('correct-bg');
            hInputEl.classList.add('correct-input');
            mInputEl.classList.add('correct-input');
            playSound('correct');
            speakTime(targetHours, targetMinutes);
            setTimeout(() => {
                clock.classList.remove('correct-bg');
                hInputEl.classList.remove('correct-input');
                mInputEl.classList.remove('correct-input');
                nextRound();
            }, 1500);
        } else {
            clock.classList.add('wrong-bg');
            playSound('wrong');

            if (isHourCorrect) {
                hInputEl.classList.add('correct-input');
            } else {
                hInputEl.classList.add('wrong-input');
                setTimeout(() => { hInputEl.value = ''; }, 400);
            }

            if (isMinuteCorrect) {
                mInputEl.classList.add('correct-input');
            } else {
                mInputEl.classList.add('wrong-input');
                setTimeout(() => { mInputEl.value = ''; }, 400);
            }

            setTimeout(() => {
                clock.classList.remove('wrong-bg');
                hInputEl.classList.remove('correct-input', 'wrong-input');
                mInputEl.classList.remove('correct-input', 'wrong-input');
            }, 800);
        }
    }

    function resetGame() {
        score = 0;
        document.getElementById('score').innerText = score;
        targetHours = -1;
        targetMinutes = -1;
        document.getElementById('start-overlay').style.display = 'flex';
        document.getElementById('input-hours').value = '';
        document.getElementById('input-minutes').value = '';
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
    }

    // Initialize game on interaction
    document.addEventListener('click', function init(e) {
        if (e.target.closest('#btn-restart')) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (targetHours === -1) {
            nextRound();
        }
    }, { once: false });

    setupClock();
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

</script>

</body>
</html>
